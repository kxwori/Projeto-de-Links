<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favoritos de Dev</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a; /* Fundo escuro */
            color: #ffffff;            /* Texto branco */
            padding: 40px;
            text-align: center;
        }
        .container {
            background: #2d2d2d;       /* Container cinza escuro */
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }
        h1 { color: #ffffff; }
        p { color: #b3b3b3; }
        ul { list-style: none; padding: 0; }
        li { margin: 15px 0; }
        a { 
            color: #4da6ff;            /* Links em azul claro para contrastar */
            text-decoration: none; 
            font-weight: bold; 
        }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Meus Links Úteis</h1>
        <p>Uma lista de sites essenciais para estudos de desenvolvimento.</p>
        <ul id="lista-links">
            <li><a href="https://github.com" target="_blank">GitHub</a></li>
            <li><a href="https://developer.mozilla.org" target="_blank">MDN Web Docs</a></li>
            <li><a href="https://git-scm.com" target="_blank">Documentação Oficial do Git</a></li>
        </ul>
    </div>

</body>
</html>
